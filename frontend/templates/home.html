{% extends "base.html" %}

{% block title %}Home - Rallye Motor's{% endblock %}

{% block content %}

<section class="relative min-h-[85vh] flex items-center justify-center overflow-hidden">

    <!-- Fondo degradado -->
    <div class="absolute inset-0 bg-gradient-to-r from-gray-800 to-black"></div>

    <!-- Contenido -->
    <div class="relative z-10 text-center">

        <h1 class="text-5xl md:text-6xl font-bold mb-6 tracking-wide">
            Bienvenido a <span class="text-red-600">Rallye Motor's</span>
        </h1>

        <p class="text-xl text-gray-300 mb-10 max-w-2xl mx-auto">
            Servicio técnico especializado, catálogo exclusivo de motocicletas y repuestos originales.
        </p>

        <div class="flex justify-center gap-6">
            <a href="/motos/"
               class="bg-red-600 hover:bg-red-700 transition px-8 py-3 rounded-full text-lg font-semibold shadow-lg">
                Ver Motocicletas
            </a>

            <a href="/sedes/"
               class="border border-white hover:bg-white hover:text-black transition px-8 py-3 rounded-full text-lg font-semibold">
                Nuestras Sedes
            </a>
        </div>

    </div>

</section>

{% endblock %}
